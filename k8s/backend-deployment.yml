apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: saurabhdave59/observability-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: "mongodb+srv://asaurabhdave_db_user:test1234test@cluster0.q2jxziz.mongodb.net/logsDB?retryWrites=true&w=majority"
            - name: PORT
              value: "8000"