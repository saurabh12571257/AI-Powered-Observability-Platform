apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: saurabhdave59/observability-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
           - name: OPENAI_API_KEY
             valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENAI_API_KEY

           - name: MONGO_URI
             valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_URI
           - name: PORT
             value: "8000"  